<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Joyeux Anniversaire</title>

<style>

body{
background: linear-gradient(135deg,#ff9acb,#ff6fa5);
font-family: Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
max-width:400px;
}

h1{
color:#ff4f8b;
font-size:32px;
}

p{
font-size:18px;
color:#555;
}

.birthday-image{
width:200px;
height:200px;
object-fit:cover;
border-radius:50%;
margin-bottom:20px;
border:5px solid #ff6fa5;
}

</style>

</head>

<body>

<div class="card">

<img src="photo.jpg" class="birthday-image">

<h1>Joyeux Anniversaire 🎉</h1>

<p>
Aujourd'hui est un jour spécial.<br>
Je te souhaite plein de bonheur,<br>
de réussite et beaucoup d'amour ❤️
</p>

<p>
Que cette nouvelle année de ta vie<br>
soit remplie de joie et de beaux moments.
</p>

</div>

</body>
</html>
